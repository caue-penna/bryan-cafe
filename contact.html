<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Bryan's Café">
    <title>Contact | Bryan's Café</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar" aria-label="Main navigation">
            <a href="index.html" class="logo"><span class="logo-icon">&#9749;</span><span class="logo-text">Bryan's Café</span></a>
            <button class="nav-toggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
            <ul class="nav-menu">
                <li><a href="index.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="caue/">Caue</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="page-header"><h1>Get in Touch</h1><p>We'd love to hear from you</p></section>
        <section class="form-section">
            <h2>Enquiry Form</h2>
            <form id="enquiry-form" class="enquiry-form" novalidate>
                <div class="form-row">
                    <div class="form-group"><label for="firstName">First Name <span class="req">*</span></label><input type="text" id="firstName" name="firstName" required minlength="2" maxlength="50"><span class="field-error" id="firstName-error"></span></div>
                    <div class="form-group"><label for="lastName">Last Name <span class="req">*</span></label><input type="text" id="lastName" name="lastName" required minlength="2" maxlength="50"><span class="field-error" id="lastName-error"></span></div>
                </div>
                <div class="form-group"><label for="email">Email Address <span class="req">*</span></label><input type="email" id="email" name="email" required maxlength="100"><span class="field-error" id="email-error"></span></div>
                <div class="form-group"><label for="subject">Message Subject <span class="req">*</span></label><input type="text" id="subject" name="subject" required minlength="3" maxlength="100"><span class="field-error" id="subject-error"></span></div>
                <div class="form-group"><label for="message">Message Body <span class="req">*</span></label><textarea id="message" name="message" rows="5" required minlength="10" maxlength="1000"></textarea><span class="field-error" id="message-error"></span></div>
                <button type="submit" class="btn btn-primary">Submit Enquiry</button>
                <div id="form-success" class="success-msg" style="display:none;" role="alert">Thank you! Your message has been sent. We'll get back to you shortly.</div>
            </form>
        </section>
        <section class="branches-container">
            <h2>Our Locations</h2>
            <div id="branches-loading" class="loading">Loading branches...</div>
            <div id="branches-error" class="error-msg" style="display:none;"></div>
            <div id="branches-content"></div>
        </section>
    </main>
    <footer class="site-footer">
        <p>&copy;<span id="current-year"></span> Bryan's Café. All rights reserved. | <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a></p>
    </footer>
    <script src="js/app.js"></script>
    <script src="js/branches.js"></script>
    <script src="js/contact-form.js"></script>
</body>
</html>
